name: deploy preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  deployments: write

jobs:
  deploy_preview:
    name: deploy preview
    runs-on: ubuntu-latest
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Create GitHub Deployment
        id: deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: netlify-preview
          transient-environment: true
          auto-inactive: true
          ref: ${{ github.event.pull_request.head.ref }}
          sha: ${{ github.event.pull_request.head.sha }}
          initial-status: in_progress
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Configure Cachix
        uses: cachix/cachix-action@v14
        with:
          name: catcolab-jmoggr
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Netlify CLI
        run: |
          cd .netlify-env
          pnpm install

      - name: Build site preview
        run: nix build .#netlify-preview -L

      - name: Deploy to Netlify
        id: netlify
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          CLEAN_BRANCH=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g')
          cd .netlify-env
          npx netlify deploy \
            --dir ../result \
            --site ${{ secrets.NETLIFY_SITE_ID }} \
            --auth ${{ secrets.NETLIFY_API_TOKEN }} \
            --alias="branch-${CLEAN_BRANCH}" \
            --json > ../deploy_output.json
          cd ..
          echo "deploy_url=$(jq -r '.deploy_url' deploy_output.json)" >> "$GITHUB_OUTPUT"

      - name: Update deployment status (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          environment-url: ${{ steps.netlify.outputs.deploy_url }}
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Update deployment status (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure
          log-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deactivate_preview:
    name: deactivate preview deployment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Deactivate deployments
        uses: actions/github-script@v7
        with:
          script: |
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.ref,
              environment: 'netlify-preview'
            });
            for (const deployment of deployments) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                state: 'inactive'
              });
            }
